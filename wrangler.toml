#:schema node_modules/wrangler/config-schema.json
# Captain Jay's AP Hub — Cloudflare Worker config
# Deploy with:  npx wrangler deploy
# (first time) create the KV namespace, then paste its id below.

name = "captainjays-ap-hub"
main = "worker.mjs"
compatibility_date = "2026-01-01"
# Keep dashboard-set variables/secrets across deploys. Without this, every CI deploy
# wiped any vars added in the Cloudflare dashboard (why the USPS keys never "took").
keep_vars = true

# --- Static assets: serves your HTML file (and anything in ./public) ---
# Put captain-jays-ap-hub.html in ./public/index.html so it loads at the root URL.
[assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker before serving assets, so it can set no-cache headers on the
# HTML (otherwise Cloudflare serves index.html directly and the browser caches it).
run_worker_first = true

# --- Workers KV: the datastore (replaces Netlify Blobs) ---
# 1) Run:  npx wrangler kv namespace create AP_HUB
# 2) Wrangler prints an id — paste it below.
[[kv_namespaces]]
binding = "AP_HUB"
id = "6a63cd74788a46519c2ad5773f78dab2"

# --- Scheduled polling: USPS tracking refresh ---
# Runs the Worker on a schedule to poll USPS for in-transit checks. Times are UTC.
# ~every 3 hours; the poller self-throttles (bounded batch per run, oldest-checked first)
# and no-ops entirely until the USPS_* secrets below are set — safe to ship dormant.
[triggers]
# 3-hourly: USPS tracking poll · nightly 08:47 UTC (~4:47am ET): KV backup (keep 7 days)
crons = ["17 */3 * * *", "47 8 * * *"]

# --- USPS Tracking API (set these as SECRETS via the Cloudflare dashboard) ---
# Workers & Pages > captainjays-ap-hub > Settings > Variables and Secrets > add each
# as an ENCRYPTED secret:
#   USPS_CLIENT_ID       developer.usps.com app "Consumer Key"
#   USPS_CLIENT_SECRET   developer.usps.com app "Consumer Secret"
# Optional email alerts (Resend):
#   RESEND_API_KEY       from resend.com
#   ALERT_EMAIL          comma-separated recipients (e.g. vainvoices@captainjays.net)
#   ALERT_FROM           a verified sender (e.g. alerts@captainjays.net)

# --- Secrets (do NOT put real secrets in this file) ---
# Set the session secret once with:
#   npx wrangler secret put AP_HUB_SECRET
# (type any long random string when prompted)
#
# Optional — only if you use the Excel/SharePoint sync — set each with `wrangler secret put`:
#   MS_TENANT_ID  MS_CLIENT_ID  MS_CLIENT_SECRET  MS_SITE_ID
#   MS_ITEM_ID (or MS_FILE_PATH)  MS_WORKSHEET  MS_TABLE  MS_KEY_COLUMN  MS_DRIVE_ID
